name: CI & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint · Type · Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  build:
    name: Build & Push image
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: registry.camillepolice.com/citadel/app
          labels: |
            org.opencontainers.image.title=Citadel
            org.opencontainers.image.description=Self-hosted LEGO collection tracker — tracks sets as an investment portfolio with daily market prices and P&L

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: registry.camillepolice.com
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            registry.camillepolice.com/citadel/app:latest
            registry.camillepolice.com/citadel/app:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy → Scarif
    runs-on: self-hosted
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Pull image
        run: sudo docker compose --env-file /volume4/docker/nas-docker/citadel/.env pull

      - name: Deploy
        run: sudo docker compose --env-file /volume4/docker/nas-docker/citadel/.env up -d --remove-orphans
